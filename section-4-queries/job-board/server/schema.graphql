type Query {
    jobs: [Job!],
    job(id: ID!): Job,
    company(id: ID!): Company
}

"""
Represents a job ad posted to our board.
"""
type Job {
    id: ID!,
    """ The __date__ when the job was published, in ISO 8601 format, e.g. `2026-08-03` """
    date: String!,
    title: String!,
    description: String,
    company: Company!
}
# This is a regular comment

type Company {
    id: ID!,
    name: String!,
    description: String!,
    jobs: [Job!]!
}

type Mutation {
    createJob(input: CreateJobInput!): Job,
    deleteJob(id: ID!): Job,
    updateJob(input: UpdateJobInput!): Job
}

input CreateJobInput {
    title: String!, description: String    
}

input UpdateJobInput {
    id: ID!, title: String!, description: String
}
